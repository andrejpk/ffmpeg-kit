name: android build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - '.github/workflows/android-build.yml'
      - 'android/**'
      - '!android/README.md'
      - 'scripts/**'
      - 'tools/**'
      - 'android.sh'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/android-build.yml'
      - 'android/**'
      - '!android/README.md'
      - 'scripts/**'
      - 'tools/**'
      - 'android.sh'

jobs:
  build:
    name: build aar
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: set up jdk 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: setup gradle
        uses: gradle/actions/setup-gradle@v4

      - name: install prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool pkg-config curl git \
            doxygen nasm cmake gcc gperf texinfo yasm bison autogen wget autopoint \
            meson ninja-build ragel groff gtk-doc-tools libtasn1-bin

      - name: set up android ndk r27b
        run: |
          curl -s "https://dl.google.com/android/repository/android-ndk-r27b-linux.zip" -o ndk.zip
          unzip -q -o ndk.zip -d .ndk
          echo "ANDROID_NDK_ROOT=$PWD/.ndk/$(ls .ndk)" >> $GITHUB_ENV

      - name: run build script
        run: ./android.sh --enable-android-media-codec --enable-android-zlib --disable-arm-v7a --disable-arm-v7a-neon --disable-x86 --disable-x86-64

      - name: print build logs
        if: always()
        run: cat build.log

      - name: print ffbuild logs
        if: failure()
        run: '[[ -f ./src/ffmpeg/ffbuild/config.log ]] && tail -50 ./src/ffmpeg/ffbuild/config.log'

      - name: upload aar
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-kit-release
          path: android/ffmpeg-kit-android-lib/build/outputs/aar/ffmpeg-kit-release.aar

  release:
    name: create release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: download aar
        uses: actions/download-artifact@v4
        with:
          name: ffmpeg-kit-release

      - name: create github release
        uses: softprops/action-gh-release@v2
        with:
          files: ffmpeg-kit-release.aar
          generate_release_notes: true
